<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planetarium</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
#wrap { width: 100vw; height: 100vh; position: relative; cursor: grab; }
#wrap:active { cursor: grabbing; }
canvas { display: block; }
#lb { position: absolute; inset: 0; pointer-events: none; }
#hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); color: rgba(150,180,255,0.45); font-size: 12px; font-family: sans-serif; white-space: nowrap; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="lb"></div>
  <div id="hint">ドラッグ / スワイプで回転</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  const wrap=document.getElementById('wrap'),canvas=document.getElementById('c'),lb=document.getElementById('lb');
  let W=wrap.clientWidth,H=wrap.clientHeight;

  const scene=new THREE.Scene();
  const camera=new THREE.PerspectiveCamera(75,W/H,0.1,500);
  const renderer=new THREE.WebGLRenderer({antialias:true,canvas});
  renderer.setSize(W,H);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));

  const group=new THREE.Group();
  scene.add(group);
  const R=90;

  function v3(ra,dec){
    const r=ra*Math.PI/180,d=dec*Math.PI/180;
    return new THREE.Vector3(Math.cos(d)*Math.cos(r)*R,Math.sin(d)*R,Math.cos(d)*Math.sin(r)*R);
  }

  // BG stars on sphere surface
  const N=3000,bgp=new Float32Array(N*3);
  for(let i=0;i<N;i++){
    const th=Math.random()*2*Math.PI,ph=Math.acos(2*Math.random()-1);
    bgp[i*3]=R*Math.sin(ph)*Math.cos(th);bgp[i*3+1]=R*Math.cos(ph);bgp[i*3+2]=R*Math.sin(ph)*Math.sin(th);
  }
  const bgGeo=new THREE.BufferGeometry();
  bgGeo.setAttribute('position',new THREE.BufferAttribute(bgp,3));
  group.add(new THREE.Points(bgGeo,new THREE.PointsMaterial({color:0xffffff,size:0.22,sizeAttenuation:true})));

  const CONS=[
    {name:'オリオン座',
     stars:[v3(88.8,7.4),v3(78.6,-8.2),v3(81.3,6.3),v3(83.0,-0.3),v3(84.1,-1.2),v3(85.2,-1.9),v3(86.9,-9.7),v3(83.8,9.9)],
     lines:[[7,0],[7,2],[0,5],[2,3],[3,4],[4,5],[1,3],[5,6]],lbl:4,color:0xffddaa},
    {name:'北斗七星',
     stars:[v3(165.9,61.8),v3(165.5,56.4),v3(178.5,53.7),v3(183.9,57.0),v3(193.5,55.9),v3(200.9,54.9),v3(206.9,49.3)],
     lines:[[0,1],[1,2],[2,3],[3,0],[3,4],[4,5],[5,6]],lbl:3,color:0xaaddff},
    {name:'カシオペア座',
     stars:[v3(2.3,59.2),v3(10.1,56.5),v3(14.2,60.7),v3(21.5,60.2),v3(28.6,63.7)],
     lines:[[0,1],[1,2],[2,3],[3,4]],lbl:2,color:0xffaacc},
    {name:'さそり座',
     stars:[v3(241.4,-19.8),v3(240.1,-22.6),v3(247.4,-26.4),v3(252.5,-34.3),v3(255.2,-37.1),v3(261.9,-37.3)],
     lines:[[0,1],[1,2],[2,3],[3,4],[4,5]],lbl:2,color:0xff8888},
    {name:'しし座',
     stars:[v3(152.1,11.9),v3(154.9,19.8),v3(152.6,16.8),v3(158.4,11.0),v3(168.5,20.5),v3(177.3,14.6)],
     lines:[[0,2],[2,1],[1,4],[0,3],[3,4],[4,5]],lbl:0,color:0xaaffcc},
    {name:'ふたご座',
     stars:[v3(113.6,28.0),v3(116.3,31.9),v3(101.3,25.1),v3(103.2,22.5),v3(99.4,20.2),v3(106.0,33.0)],
     lines:[[0,1],[0,2],[1,3],[2,4],[1,5]],lbl:0,color:0xddbbff},
  ];

  const lblEls=CONS.map(({name,color})=>{
    const el=document.createElement('div');
    const hex='#'+color.toString(16).padStart(6,'0');
    el.style.cssText=`position:absolute;color:${hex};font-size:12px;font-family:sans-serif;white-space:nowrap;transform:translate(-50%,-150%);pointer-events:none;opacity:0;`;
    el.textContent=name;
    lb.appendChild(el);
    return el;
  });

  CONS.forEach(({stars,lines,color})=>{
    const pos=new Float32Array(stars.length*3);
    stars.forEach((s,i)=>{pos[i*3]=s.x;pos[i*3+1]=s.y;pos[i*3+2]=s.z;});
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
    group.add(new THREE.Points(geo,new THREE.PointsMaterial({color,size:0.75,sizeAttenuation:true})));
    const pts=[];
    lines.forEach(([a,b])=>pts.push(stars[a],stars[b]));
    group.add(new THREE.LineSegments(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color,opacity:0.4,transparent:true})
    ));
  });

  group.rotation.y=Math.PI;

  let drag=false,px=0,py=0,vx=0,vy=0;
  const SPD=0.004;
  function dn(x,y){drag=true;px=x;py=y;vx=0;vy=0;}
  function mv(x,y){if(!drag)return;const dx=x-px,dy=y-py;vx=dy*SPD;vy=dx*SPD;group.rotation.x+=vx;group.rotation.y+=vy;px=x;py=y;}
  function up(){drag=false;}

  canvas.addEventListener('mousedown',e=>dn(e.clientX,e.clientY));
  window.addEventListener('mousemove',e=>mv(e.clientX,e.clientY));
  window.addEventListener('mouseup',up);
  canvas.addEventListener('touchstart',e=>{dn(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
  window.addEventListener('touchmove',e=>{mv(e.touches[0].clientX,e.touches[0].clientY);e.preventDefault();},{passive:false});
  window.addEventListener('touchend',up);

  window.addEventListener('resize',()=>{
    W=wrap.clientWidth;H=wrap.clientHeight;
    camera.aspect=W/H;camera.updateProjectionMatrix();
    renderer.setSize(W,H);
  });

  const tmp=new THREE.Vector3();
  function animate(){
    requestAnimationFrame(animate);
    if(!drag){group.rotation.y+=0.0003;vx*=0.92;vy*=0.92;group.rotation.x+=vx;group.rotation.y+=vy;}
    renderer.render(scene,camera);
    CONS.forEach(({stars,lbl},i)=>{
      tmp.copy(stars[lbl]);
      group.localToWorld(tmp);
      const cs=tmp.clone().applyMatrix4(camera.matrixWorldInverse);
      const inFront=cs.z<-0.5;
      const p=tmp.clone().project(camera);
      lblEls[i].style.opacity=inFront?'1':'0';
      if(inFront){lblEls[i].style.left=((p.x+1)/2*W)+'px';lblEls[i].style.top=(-(p.y-1)/2*H)+'px';}
    });
  }
  animate();
})();
</script>
</body>
</html>
